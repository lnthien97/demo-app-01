# Minimal nginx config for a static site + /health endpoint.
# Listens on a non-privileged port (8080) so the container can run as non-root.

worker_processes auto;
pid /tmp/nginx.pid;

# Send error logs to stderr so they show up in `kubectl logs`.
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Access logs to stdout for `kubectl logs`.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /dev/stdout main;

    # Writable temp paths (root FS is read-only in the Pod securityContext).
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 8080 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Probe endpoint used by Kubernetes liveness/readiness.
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
