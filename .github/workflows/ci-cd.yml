name: ci-cd

# Build the nginx image, push to GHCR, deploy to Kubernetes.
#
# Required secret:
#   KUBE_CONFIG  - base64-encoded kubeconfig with permission to update the
#                  nginx-app Deployment.   Create with:  base64 -w0 ~/.kube/config

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "nginx.conf"
      - "Dockerfile"
      - "k8s/**"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NAMESPACE: nginx-app
  DEPLOYMENT: nginx-app
  CONTAINER: nginx

jobs:
  # --- Stage 1: lint --------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate nginx.conf
        run: |
          # Spin up the same base image we ship and ask nginx to parse the conf.
          docker run --rm -v "$PWD/nginx.conf:/etc/nginx/nginx.conf:ro" \
            nginxinc/nginx-unprivileged:1.27-alpine \
            nginx -t -c /etc/nginx/nginx.conf

      - name: Basic HTML check
        run: |
          test -s site/index.html
          grep -q "</html>" site/index.html

  # --- Stage 2: build & push image ------------------------------------------
  build:
    name: Build & push image
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Stage 3: deploy ------------------------------------------------------
  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.2"

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info

      - name: Apply baseline manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/service.yaml
          kubectl -n "$NAMESPACE" get deploy "$DEPLOYMENT" >/dev/null 2>&1 \
            || kubectl apply -f k8s/deployment.yaml

      - name: Roll out new image
        run: |
          IMAGE_DIGEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"
          echo "Deploying $IMAGE_DIGEST"
          kubectl -n "$NAMESPACE" set image \
            deployment/"$DEPLOYMENT" \
            "$CONTAINER"="$IMAGE_DIGEST"

      - name: Wait for rollout
        run: |
          kubectl -n "$NAMESPACE" rollout status \
            deployment/"$DEPLOYMENT" --timeout=3m

      - name: Smoke test
        run: |
          kubectl -n "$NAMESPACE" run smoke-${{ github.run_id }} \
            --rm -i --restart=Never --image=curlimages/curl:8.10.1 -- \
            sh -c '
              set -e
              curl -fsS http://nginx-app/health    && echo
              curl -fsS http://nginx-app/version.json && echo
              curl -fsS -I http://nginx-app/ | head -1
            '
