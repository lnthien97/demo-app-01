apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
  namespace: nginx-app
  labels:
    app.kubernetes.io/name: nginx-app
    app.kubernetes.io/part-of: nginx-app
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-app
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: nginx-app
      containers:
        - name: nginx
          # Overwritten by CI with the immutable @digest of the pushed image.
          # This default is just for first-time `kubectl apply`.
          image: ghcr.io/REPLACE_ME/nginx-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "20m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 1
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          # nginx needs a few writable paths even with readOnlyRootFilesystem.
          volumeMounts:
            - { name: tmp,        mountPath: /tmp }
            - { name: cache,      mountPath: /var/cache/nginx }
            - { name: run,        mountPath: /var/run }
      volumes:
        - { name: tmp,   emptyDir: {} }
        - { name: cache, emptyDir: {} }
        - { name: run,   emptyDir: {} }
      imagePullSecrets:
        - name: ghcr-pull
